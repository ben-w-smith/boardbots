# Nginx reverse proxy configuration for BoardBots
# Supports WebSocket connections and long-lived connections
# Replace ${SERVER_NAME} with your domain or droplet IP

# Upstream configuration for the BoardBots application
upstream boardbots_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP server - redirects to HTTPS when SSL is configured
server {
    listen 80;
    server_name ${SERVER_NAME:_};

    # Allow large client bodies for game state
    client_max_body_size 1M;

    # Proxy all requests to the BoardBots application
    location / {
        proxy_pass http://boardbots_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (optional - can be used for monitoring)
    location /health {
        proxy_pass http://boardbots_backend/api/health;
        access_log off;
    }
}

